<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6e0d34">
<meta name="color-scheme" content="light">
<title>秘書工具</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <h1>秘書工具</h1>
  <button id="refreshBtn" class="icon-btn" title="重新整理">⟳</button>
</header>

<main id="main">
  <section id="tab-briefing" class="tab">
    <h2>每日晨報</h2>
    <div id="briefingCard" class="list"></div>
  </section>

  <section id="tab-todos" class="tab">
    <h2>待辦事項</h2>
    <div id="todosListView">
      <form id="todoForm" class="note-form">
        <input id="todoInput" type="text" placeholder="標題" autocomplete="off">
        <div class="datetime-row">
          <div class="field">
            <input id="todoDateInput" type="date">
            <span class="field-placeholder">日期（選填）</span>
          </div>
          <div class="time-select-row">
            <select id="todoTimeAmpm"><option value="">--</option><option value="AM">上午</option><option value="PM">下午</option></select>
            <select id="todoTimeHour"></select>
            <select id="todoTimeMinute"></select>
          </div>
        </div>
        <textarea id="todoContentInput" rows="2" placeholder="內容（選填）…"></textarea>
        <button id="todoAddBtn" type="submit">新增</button>
      </form>
      <div id="todosList" class="list"></div>
    </div>
    <div id="todoEditView" class="hidden">
      <button id="todoBackBtn" class="back-btn">← 返回</button>
      <form id="todoEditForm" class="note-form">
        <input id="todoEditTitle" type="text" placeholder="標題">
        <div class="datetime-row">
          <div class="field">
            <input id="todoEditDate" type="date">
            <span class="field-placeholder">日期（選填）</span>
          </div>
          <div class="time-select-row">
            <select id="todoEditTimeAmpm"><option value="">--</option><option value="AM">上午</option><option value="PM">下午</option></select>
            <select id="todoEditTimeHour"></select>
            <select id="todoEditTimeMinute"></select>
          </div>
        </div>
        <textarea id="todoEditContent" rows="3" placeholder="內容…"></textarea>
        <button type="submit">儲存</button>
      </form>
    </div>
  </section>

  <section id="tab-notes" class="tab">
    <h2>筆記</h2>
    <div id="notesListView">
      <form id="categoryForm" class="add-form">
        <input id="categoryNameInput" type="text" placeholder="新增分類…" autocomplete="off">
        <button id="categoryAddBtn" type="submit">新增</button>
      </form>
      <button id="categoryManageToggle" type="button" class="back-btn">管理分類 ▾</button>
      <div id="categoryManageList" class="category-list hidden"></div>
      <select id="noteCategoryFilter">
        <option value="">顯示全部分類</option>
      </select>
      <form id="noteForm" class="note-form">
        <input id="noteTitleInput" type="text" placeholder="標題" autocomplete="off">
        <select id="noteCategorySelect">
          <option value="">未分類</option>
        </select>
        <textarea id="noteContentInput" rows="3" placeholder="內容…"></textarea>
        <button id="noteAddBtn" type="submit">新增</button>
      </form>
      <div id="notesList" class="list"></div>
    </div>
    <div id="noteDetailView" class="hidden">
      <button id="noteBackBtn" class="back-btn">← 返回</button>
      <div class="meta" id="noteDetailMeta"></div>
      <form id="noteEditForm" class="note-form">
        <input id="noteEditTitle" type="text" placeholder="標題">
        <select id="noteEditCategorySelect">
          <option value="">未分類</option>
        </select>
        <textarea id="noteEditContent" rows="6" placeholder="內容…"></textarea>
        <button type="submit">儲存</button>
      </form>
    </div>
  </section>

  <section id="tab-settings" class="tab">
    <h2>每日晨報設定</h2>
    <div class="list">
      <div class="card">
        <div class="content">
          <div class="title">匯報時間</div>
          <input id="briefingTime" type="time">
        </div>
      </div>
      <div class="card">
        <div class="content">
          <div class="title">自訂匯報內容</div>
          <textarea id="briefingTopics" rows="4" placeholder="例如：提醒我留意天氣、幫我看一下今天有沒有重要新聞…"></textarea>
          <button id="instantBriefingBtn" type="button" class="btn-block btn-blue">立刻匯報</button>
        </div>
      </div>
    </div>

    <h2>重點整理</h2>
    <div class="list">
      <div class="card">
        <div class="content">
          <div class="title">資料重點整理</div>
          <textarea id="summaryInput" rows="6" placeholder="貼上要整理的資料…"></textarea>
          <button id="summaryBtn" type="button" class="btn-block btn-blue">整理重點</button>
          <div id="summaryResult" class="note-detail-content"></div>
          <div id="summaryToNoteRow" class="hidden">
            <input id="summaryNoteTitle" type="text" placeholder="筆記標題" autocomplete="off">
            <select id="summaryNoteCategorySelect">
              <option value="">未分類</option>
            </select>
            <button id="summaryToNoteBtn" type="button" class="btn-block" disabled>新增到筆記</button>
          </div>
          <button id="summaryClearBtn" type="button" class="btn-block btn-danger">刪除已輸入訊息</button>
        </div>
      </div>
    </div>
  </section>
</main>

<nav class="tabbar">
  <button class="tab-btn active" data-tab="briefing">晨報</button>
  <button class="tab-btn" data-tab="todos">待辦</button>
  <button class="tab-btn" data-tab="notes">筆記</button>
  <button class="tab-btn" data-tab="settings">設定</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
