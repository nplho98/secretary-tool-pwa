<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b5e20">
<meta name="color-scheme" content="light">
<title>秘書工具</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <h1>秘書工具</h1>
  <button id="refreshBtn" class="icon-btn" title="重新整理">⟳</button>
</header>

<main id="main">
  <section id="tab-briefing" class="tab">
    <h2>每日晨報</h2>
    <div id="briefingCard" class="list"></div>
  </section>

  <section id="tab-stocks" class="tab">
    <button id="stockRefreshBtn" type="button" class="btn-block">即時更新股票</button>
    <div class="stock-grid">
      <div class="stock-quad">
        <h2>固定指數</h2>
        <div id="fixedQuotesList" class="list"></div>
        <div id="outlookCard" class="list"></div>
      </div>

      <div class="stock-quad">
        <h2>自選股（最多 6 檔）</h2>
        <div id="customQuotesList" class="list"></div>
        <form id="watchlistForm" class="add-form watchlist-form">
          <input id="wlSymbol" type="text" placeholder="代號，例如 2330.TW" autocomplete="off">
          <input id="wlName" type="text" placeholder="名稱" autocomplete="off">
          <button type="submit">新增</button>
        </form>
      </div>
    </div>
  </section>

  <section id="tab-todos" class="tab">
    <h2>待辦事項</h2>
    <form id="todoForm" class="add-form">
      <input id="todoInput" type="text" placeholder="新增待辦事項…" autocomplete="off">
      <button type="submit">新增</button>
    </form>
    <div id="todosList" class="list"></div>
  </section>

  <section id="tab-notes" class="tab">
    <h2>筆記</h2>
    <div id="notesListView">
      <form id="noteForm" class="note-form">
        <input id="noteTitleInput" type="text" placeholder="標題" autocomplete="off">
        <textarea id="noteContentInput" rows="3" placeholder="內容…"></textarea>
        <button type="submit">新增</button>
      </form>
      <div id="notesList" class="list"></div>
    </div>
    <div id="noteDetailView" class="hidden">
      <button id="noteBackBtn" class="back-btn">← 返回</button>
      <div class="card">
        <div class="content">
          <div class="title" id="noteDetailTitle"></div>
          <div class="meta" id="noteDetailMeta"></div>
          <div class="note-detail-content" id="noteDetailContent"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="tab-schedule" class="tab">
    <h2>行程</h2>
    <div id="scheduleList" class="list"></div>
  </section>

  <section id="tab-settings" class="tab">
    <h2>每日晨報設定</h2>
    <div class="list">
      <div class="card">
        <div class="content">
          <div class="title">匯報時間</div>
          <input id="briefingTime" type="time">
        </div>
      </div>
      <div class="card">
        <div class="content">
          <div class="title">自訂匯報內容</div>
          <textarea id="briefingTopics" rows="4" placeholder="例如：提醒我留意天氣、幫我看一下今天有沒有重要新聞…"></textarea>
          <button id="instantBriefingBtn" type="button" class="btn-block">立馬匯報</button>
        </div>
      </div>
    </div>

    <h2>重點整理</h2>
    <div class="list">
      <div class="card">
        <div class="content">
          <div class="title">資料重點整理</div>
          <textarea id="summaryInput" rows="6" placeholder="貼上要整理的資料…"></textarea>
          <button id="summaryBtn" type="button" class="btn-block">整理重點</button>
          <div id="summaryResult" class="note-detail-content"></div>
          <div id="summaryToNoteRow" class="hidden">
            <input id="summaryNoteTitle" type="text" placeholder="筆記標題" autocomplete="off">
            <button id="summaryToNoteBtn" type="button" class="btn-block" disabled>新增到筆記</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<nav class="tabbar">
  <button class="tab-btn active" data-tab="briefing">晨報</button>
  <button class="tab-btn" data-tab="stocks">股票</button>
  <button class="tab-btn" data-tab="todos">待辦</button>
  <button class="tab-btn" data-tab="notes">筆記</button>
  <button class="tab-btn" data-tab="schedule">行程</button>
  <button class="tab-btn" data-tab="settings">設定</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
