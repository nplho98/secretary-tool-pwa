<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b5e20">
<meta name="color-scheme" content="light">
<title>秘書工具</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <h1>秘書工具</h1>
  <button id="refreshBtn" class="icon-btn" title="重新整理">⟳</button>
</header>

<main id="main">
  <section id="tab-briefing" class="tab">
    <h2>每日早報</h2>
    <div id="briefingCard" class="list"></div>
  </section>

  <section id="tab-stocks" class="tab">
    <h2>固定指數</h2>
    <div id="fixedQuotesList" class="list"></div>

    <h2>大盤趨勢研判</h2>
    <div id="outlookCard" class="list"></div>

    <h2>自選股（最多 4 檔）</h2>
    <div id="customQuotesList" class="list"></div>

    <form id="watchlistForm" class="add-form watchlist-form">
      <input id="wlSymbol" type="text" placeholder="代號，例如 2330.TW" autocomplete="off">
      <input id="wlName" type="text" placeholder="名稱" autocomplete="off">
      <input id="wlPctUp" type="number" step="0.1" min="0" placeholder="漲幅通知%">
      <input id="wlPctDown" type="number" step="0.1" min="0" placeholder="跌幅通知%">
      <button type="submit">新增</button>
    </form>

    <h2>股票通知</h2>
    <div id="stocksList" class="list"></div>
  </section>

  <section id="tab-todos" class="tab">
    <h2>待辦事項</h2>
    <form id="todoForm" class="add-form">
      <input id="todoInput" type="text" placeholder="新增待辦事項…" autocomplete="off">
      <button type="submit">新增</button>
    </form>
    <div id="todosList" class="list"></div>
  </section>

  <section id="tab-notes" class="tab">
    <h2>筆記</h2>
    <form id="noteForm" class="add-form">
      <input id="noteInput" type="text" placeholder="快速記錄…" autocomplete="off">
      <button type="submit">新增</button>
    </form>
    <div id="notesList" class="list"></div>
  </section>

  <section id="tab-schedule" class="tab">
    <h2>行程</h2>
    <div id="scheduleList" class="list"></div>
  </section>

  <section id="tab-settings" class="tab">
    <h2>未確認重複提醒</h2>
    <div class="list">
      <label class="card radio-row">
        <input type="radio" name="reminderInterval" value="0">
        <div class="content">
          <div class="title">不重複提醒</div>
          <div class="meta">只通知一次</div>
        </div>
      </label>
      <label class="card radio-row">
        <input type="radio" name="reminderInterval" value="5">
        <div class="content">
          <div class="title">每 5 分鐘</div>
        </div>
      </label>
      <label class="card radio-row">
        <input type="radio" name="reminderInterval" value="10">
        <div class="content">
          <div class="title">每 10 分鐘</div>
        </div>
      </label>
      <label class="card radio-row">
        <input type="radio" name="reminderInterval" value="30">
        <div class="content">
          <div class="title">每 30 分鐘</div>
        </div>
      </label>
    </div>

    <h2>每日早報設定</h2>
    <div class="list">
      <div class="card">
        <div class="content">
          <div class="title">匯報時間</div>
          <input id="briefingTime" type="time">
        </div>
      </div>
      <div class="card">
        <div class="content">
          <div class="title">自訂匯報內容</div>
          <textarea id="briefingTopics" rows="4" placeholder="例如：提醒我留意天氣、幫我看一下今天有沒有重要新聞…"></textarea>
        </div>
      </div>
    </div>
  </section>
</main>

<nav class="tabbar">
  <button class="tab-btn active" data-tab="briefing">早報</button>
  <button class="tab-btn" data-tab="stocks">股票</button>
  <button class="tab-btn" data-tab="todos">待辦</button>
  <button class="tab-btn" data-tab="notes">筆記</button>
  <button class="tab-btn" data-tab="schedule">行程</button>
  <button class="tab-btn" data-tab="settings">設定</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
